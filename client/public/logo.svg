<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" fill="none">
  <!-- Icon: ECG pulse transforming into data bars -->
  <g>
    <!-- Background circle -->
    <circle cx="24" cy="24" r="20" fill="#2563EB" opacity="0.1"/>
    <circle cx="24" cy="24" r="20" stroke="#2563EB" stroke-width="1.5" fill="none"/>
    <!-- ECG/Heartbeat pulse line -->
    <polyline points="6,24 12,24 15,14 18,34 21,18 24,28 27,20 30,24 36,24 38,20 40,28 42,24" 
      stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Data bars (AI nodes) -->
    <rect x="36" y="20" width="3" height="8" fill="#06B6D4" rx="1" opacity="0.9"/>
    <rect x="40" y="17" width="3" height="11" fill="#2563EB" rx="1" opacity="0.9"/>
    <rect x="44" y="22" width="3" height="6" fill="#10B981" rx="1" opacity="0.9"/>
  </g>
  <!-- Wordmark -->
  <text x="58" y="20" font-family="'Plus Jakarta Sans', Inter, sans-serif" font-weight="700" font-size="13" fill="#1E293B">Clinical Insight</text>
  <text x="58" y="36" font-family="'Plus Jakarta Sans', Inter, sans-serif" font-weight="400" font-size="11" fill="#64748B">Engine</text>
  <!-- AI badge -->
  <rect x="185" y="10" width="22" height="13" rx="3" fill="#2563EB"/>
  <text x="196" y="20.5" font-family="'Plus Jakarta Sans', Inter, sans-serif" font-weight="700" font-size="8.5" fill="white" text-anchor="middle">AI</text>
</svg>
